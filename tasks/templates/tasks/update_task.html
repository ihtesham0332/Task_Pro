<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen py-12 px-4 flex items-center justify-center font-sans selection:bg-indigo-200 selection:text-indigo-900">

    <div class="w-full max-w-md bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl overflow-hidden p-8 border border-white/50">
        
        <div class="mb-8 text-center">
            <h2 class="text-2xl font-extrabold text-slate-800">Update Task ✏️</h2>
            <p class="text-slate-500 text-sm mt-1">Make your changes below</p>
        </div>

        <form method="POST" action="" class="space-y-6">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 ml-1">Task Title</label>
                {{ form.title }}
            </div>

            <div class="pt-4 flex gap-3">
                <a href="/" class="flex-1 text-center py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors shadow-sm">
                    Cancel
                </a>
                <button type="submit" class="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg hover:shadow-indigo-500/30 transition-all transform hover:-translate-y-0.5 active:scale-95">
                    Save Changes
                </button>
            </div>
        </form>

    </div>

</body>
</html>
