<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen py-12 px-4 flex items-center justify-center font-sans">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden p-8 text-center border-t-4 border-red-500">
        
        <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">
            🗑️
        </div>

        <h2 class="text-2xl font-extrabold text-slate-800 mb-2">Delete Task?</h2>
        <p class="text-slate-500 text-sm mb-6">
            Are you sure you want to delete "<span class="font-bold text-slate-700">{{ item }}</span>"? This action cannot be undone.
        </p>

        <form method="POST" action="">
            {% csrf_token %}
            <div class="flex gap-3">
                <a href="/" class="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors">
                    Cancel
                </a>
                <button type="submit" class="flex-1 py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl shadow-lg transition-all transform active:scale-95">
                    Yes, Delete
                </button>
            </div>
        </form>

    </div>

</body>
</html>
